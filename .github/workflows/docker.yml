name: CI/CD Portfolio

on:
  push:
    branches: [ "master" ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t portifolio .

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Run container test
        run: |
          docker build -t portifolio .
          docker run -d -p 8080:80 portifolio
          sleep 5
          curl -f http://localhost:8080 || exit 1

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/portifolio:latest .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/portifolio:latest