name: CI/CD Portfolio

on:
  push:
    branches: ["master"]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verificar ficheiros (debug)
        run: ls -la

      - name: Build Docker image
        run: docker build -t portifolio .

      - name: Teste básico da imagem
        run: docker images | grep portifolio


  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t portifolio .

      - name: Run container
        run: |
          docker run -d -p 8080:80 --name portfolio_test portifolio
          sleep 5
          curl -f http://localhost:8080 || (docker logs portfolio_test && exit 1)

#atualize aqui.
  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build imagem de produção
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/portifolio:latest .

      - name: Push para Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/portifolio:latest