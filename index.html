<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedro Panzo | Portfolio</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  color:white;
  overflow-x:hidden;
  scroll-behavior:smooth;
}

.carousel {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-2;
  background-size:cover;
  background-position:center;
  animation:fade 20s infinite;
}

@keyframes fade {
  0% { background-image:url('assets/bg-carousel/1.jpg'); }
  25% { background-image:url('assets/bg-carousel/2.jpg'); }
  50% { background-image:url('assets/bg-carousel/3.jpg'); }
  75% { background-image:url('assets/bg-carousel/4.jpg'); }
  100% { background-image:url('assets/bg-carousel/1.jpg'); }
}

.overlay {
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

.nav {
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  z-index:10;
}

.nav a {
  margin-left:20px;
  color:white;
  text-decoration:none;
  font-size:14px;
  transition:0.3s;
}

.nav a:hover {
  color:#ffd700;
  text-shadow:0 0 8px #ffd700;
}

section {
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:60px 20px;
}

.card {
  background:rgba(0,0,0,0.7);
  padding:30px;
  border-radius:15px;
  width:80%;
  max-width:950px;
  box-shadow:0 0 30px rgba(0,0,0,0.7);
}

h1,h2 { text-align:center; }
.subtitle { text-align:center; opacity:0.85; }

.info-box {
  border:1px solid rgba(255,255,255,0.2);
  padding:18px;
  border-radius:12px;
  margin-top:15px;
  background:rgba(255,255,255,0.05);
  line-height:1.7;
}

.highlight {
  color:#ffd700;
  font-weight:bold;
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:20px;
}

.grid img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.2);
  transition:0.3s;
}

.grid img:hover { transform:scale(1.05); }

.buttons {
  margin-top:20px;
  display:flex;
  justify-content:center;
  gap:15px;
}

.btn-square {
  background:transparent;
  border:1px solid white;
  color:white;
  padding:10px 18px;
  cursor:pointer;
  transition:0.3s;
  border-radius:6px;
  min-width:120px;
}

.btn-square:hover {
  background:#ffd700;
  color:black;
  border-color:#ffd700;
}

.btn-square.active {
  background:#ffd700;
  color:black;
  border-color:#ffd700;
}

.top-bar {
  position:fixed;
  top:15px;
  right:20px;
  z-index:20;
}

.lang-btn {
  background:none;
  border:none;
  color:white;
  margin-left:10px;
  cursor:pointer;
  font-size:14px;
}
.lang-btn:hover { color:#ffd700; }

</style>
</head>

<body>

<div class="top-bar">
  <button class="lang-btn" onclick="setLang('en')">EN</button>
  <button class="lang-btn" onclick="setLang('pt')">PT</button>
</div>

<div class="carousel"></div>
<div class="overlay"></div>

<div class="nav">
  <a href="#home">Home</a>
  <a href="#journey">Jornada</a>
  <a href="#certs">Certificados</a>
  <a href="#contact">Contacto</a>
  <a href="cv/cv.html" target="_blank">CV</a>
</div>

<section id="home">
  <div class="card">
    <h1>Pedro Panzo</h1>
    <p class="subtitle" data-i18n="subtitle"></p>

    <div class="info-box" data-i18n="homeInfo"></div>

    <div class="buttons">
      <button class="btn-square" onclick="window.location.href='cv/cv.html'" data-i18n="btnCv"></button>
      <button class="btn-square" onclick="document.getElementById('contact').scrollIntoView()" data-i18n="btnContact"></button>
    </div>
  </div>
</section>

<section id="journey">
  <div class="card">
    <h2 data-i18n="journeyTitle"></h2>

    <div class="info-box" data-i18n="journeyInfo"></div>

    <div class="grid">
      <img src="assets/bg-carousel/1.jpg">
      <img src="assets/bg-carousel/2.jpg">
      <img src="assets/bg-carousel/3.jpg">
      <img src="assets/bg-carousel/4.jpg">
      <img src="assets/bg-carousel/5.jpg">
    </div>
  </div>
</section>

<section id="certs">
  <div class="card">
    <h2 data-i18n="certsTitle"></h2>

    <div class="info-box" data-i18n="certsInfo"></div>

    <div class="grid">
      <img src="assets/bg-carousel/6.jpg">
      <img src="assets/bg-carousel/7.jpg">
      <img src="assets/bg-carousel/8.jpg">
      <img src="assets/bg-carousel/9.jpg">

    </div>
  </div>
</section>

<section id="contact">
  <div class="card">
    <h2 data-i18n="contactTitle"></h2>
    <p><span class="highlight">📞</span> +351 937277022</p>
    <p><span class="highlight">📧</span> panzo5225@gmail.com</p>

    <div class="buttons">
      <button class="btn-square" onclick="window.open('https://github.com','_blank')">GitHub</button>
      <button class="btn-square" onclick="window.open('https://linkedin.com','_blank')">LinkedIn</button>
    </div>
  </div>
</section>

<script>
const translations = {
  en: {
    subtitle: "DevOps & Cybersecurity | Networks & Infrastructure",

    homeInfo:
      "Professional in <span class='highlight'>IT networks</span>, infrastructure and technical support with strong focus on <span class='highlight'>security</span>, stability and performance. Experienced in LAN environments, Cisco configuration, troubleshooting and enterprise systems management. Certified in <span class='highlight'>CCNA</span>, Docker, Terraform and CI/CD pipelines aligned with DevOps and cloud engineering practices.",

    journeyTitle: "Professional Journey",

    journeyInfo:
      "Active participation in <span class='highlight'>Angola Open Source</span> and <span class='highlight'>Google Developers Angola</span>, engaging with innovation, collaboration and modern software practices. Also worked as an <span class='highlight'>IT instructor</span> in Angola, teaching and mentoring students, strengthening leadership, communication and technical expertise.",

    certsTitle: "Courses & Certifications",

    certsInfo:
      "Includes <span class='highlight'>Cisco CCNA</span>, Docker, Terraform, CI/CD pipelines and cloud infrastructure technologies focused on automation and scalability.",

    btnCv: "View CV",
    btnContact: "Contact",

    contactTitle: "Contact"
  },

  pt: {
    subtitle: "DevOps & Cibersegurança | Redes & Infraestrutura",

    homeInfo:
      "Profissional de <span class='highlight'>redes de TI</span>, infraestrutura e suporte técnico com forte foco em <span class='highlight'>segurança</span>, estabilidade e desempenho. Experiência em ambientes LAN, configuração Cisco, troubleshooting e gestão de sistemas empresariais. Certificação em <span class='highlight'>CCNA</span>, Docker, Terraform e CI/CD com práticas modernas de DevOps e cloud.",

    journeyTitle: "Jornada Profissional",

    journeyInfo:
      "Participação ativa no <span class='highlight'>Angola Open Source</span> e na comunidade <span class='highlight'>Google Developers Angola</span>, com foco em inovação e colaboração tecnológica. Experiência como <span class='highlight'>instrutor de TI</span> em Angola, formando e orientando estudantes e desenvolvendo competências de liderança e comunicação.",

    certsTitle: "Cursos & Certificados",

    certsInfo:
      "Inclui certificação <span class='highlight'>CCNA Cisco</span>, Docker, Terraform, pipelines CI/CD e infraestrutura cloud com foco em automação.",

    btnCv: "Ver CV",
    btnContact: "Contacto",

    contactTitle: "Contacto"
  }
};

function setLang(lang) {
  localStorage.setItem("lang", lang);
  applyLang(lang);
}

function applyLang(lang) {
  const t = translations[lang];
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (t[key]) el.innerHTML = t[key];
  });

  document.querySelectorAll(".btn-square").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".btn-square").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    });
  });
}

window.addEventListener("DOMContentLoaded", () => {
  const saved = localStorage.getItem("lang") || "en";
  applyLang(saved);
});
</script>

</body>
</html>
